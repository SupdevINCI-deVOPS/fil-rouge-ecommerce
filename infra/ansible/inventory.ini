# ============================================================
# inventory.ini — Liste des VMs à configurer
# Après chaque terraform apply, remplace l'IP par la nouvelle
# ============================================================

[preprod]
preprod-vm ansible_host=REMPLACE_PAR_IP_PREPROD ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[prod]
prod-vm ansible_host=REMPLACE_PAR_IP_PROD ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'