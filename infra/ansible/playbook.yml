# ============================================================
# playbook.yml — Configure la VM et déploie l'app e-commerce
#
# Ce playbook fait dans l'ordre :
#   1. Met à jour Amazon Linux 2023
#   2. Installe Docker + Docker Compose
#   3. Crée les dossiers de l'app
#   4. Copie les fichiers .env
#   5. Clone le repo GitHub
#   6. Lance docker compose up
#
# Usage :
#   preprod : ansible-playbook -i inventory.ini playbook.yml -l preprod
#   prod    : ansible-playbook -i inventory.ini playbook.yml -l prod
# ============================================================

---
- name: Déploiement app ecommerce microservices
  hosts: all
  become: true   # exécute les commandes en sudo

  vars:
    app_dir: /opt/ecommerce
    github_repo: "https://github.com/arosfa/fil-rouge-ecommerce.git"
    github_branch: "develop"  # pour preprod

  tasks:

    # ----------------------------------------------------------
    # ÉTAPE 1 — Mise à jour du système
    # ----------------------------------------------------------
    - name: Mise à jour des paquets
      dnf:
        name: "*"
        state: latest
        update_cache: yes

    # ----------------------------------------------------------
    # ÉTAPE 2 — Installation Docker et Git
    # Docker est disponible directement dans les repos Amazon Linux 2023
    # ----------------------------------------------------------
    - name: Installation Docker et Git
      dnf:
        name:
          - docker
          - git
        state: present

    # ----------------------------------------------------------
    # ÉTAPE 3 — Installation Docker Compose v2
    # ----------------------------------------------------------
    - name: Installation Docker Compose
      get_url:
        url: https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    # ----------------------------------------------------------
    # ÉTAPE 4 — Démarrage Docker au boot
    # ----------------------------------------------------------
    - name: Démarrage et activation Docker
      service:
        name: docker
        state: started
        enabled: yes

    # ----------------------------------------------------------
    # ÉTAPE 5 — Ajout ec2-user au groupe docker
    # Pour lancer docker sans sudo
    # ----------------------------------------------------------
    - name: Ajout utilisateur ec2-user au groupe docker
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Reconnexion pour appliquer le groupe docker
      meta: reset_connection

    # ----------------------------------------------------------
    # ÉTAPE 6 — Création du dossier de l'app
    # ----------------------------------------------------------
    - name: Création du dossier /opt/ecommerce
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    # ----------------------------------------------------------
    # ÉTAPE 7 — Clone du repo GitHub
    # Si le repo existe déjà, fait un git pull
    # ----------------------------------------------------------
    - name: Clone / mise à jour du repo GitHub
      git:
        repo: "{{ github_repo }}"
        dest: "{{ app_dir }}"
        version: "{{ github_branch }}"
        force: yes
      become_user: ec2-user

    # ----------------------------------------------------------
    # ÉTAPE 8 — Copie du fichier .env backend
    # Le .env est dans ansible/env/ sur ton Mac
    # Il est copié dans backend/ sur la VM
    # ----------------------------------------------------------
    - name: Copie .env backend
      copy:
        src: env/backend.env
        dest: "{{ app_dir }}/backend/.env"
        owner: ec2-user
        mode: '0600'

    # ----------------------------------------------------------
    # ÉTAPE 9 — Lancement de l'app avec Docker Compose
    # ----------------------------------------------------------
    - name: Lancement docker-compose
      command:
        cmd: docker-compose up -d --build
        chdir: "{{ app_dir }}"
      become_user: ec2-user

    # ----------------------------------------------------------
    # ÉTAPE 10 — Vérification que les containers tournent
    # ----------------------------------------------------------
    - name: Vérification containers actifs
      command: docker ps
      register: docker_ps_output
      become_user: ec2-user

    - name: Affichage containers actifs
      debug:
        msg: "{{ docker_ps_output.stdout_lines }}"
