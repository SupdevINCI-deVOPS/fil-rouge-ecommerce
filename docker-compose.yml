version: '3.8'

services:

  # --------------------------------------------------------
  # MongoDB — Base de données
  # Login admin : admin / password
  # --------------------------------------------------------
  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ecommerce
    volumes:
      - mongo_data:/data/db
      - "./backend/mongo-entrypoint/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro"
    networks:
      - ecommerce

  # --------------------------------------------------------
  # Mongo Express — Interface admin MongoDB
  # Accessible sur http://localhost:8081
  # --------------------------------------------------------
  mongo-express:
    image: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongo:27017/
    networks:
      - ecommerce

  # --------------------------------------------------------
  # Backend — Node.js / Express API
  # Accessible sur http://localhost:3000
  # --------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    env_file:
      - ./backend/.env
    networks:
      - ecommerce

  # --------------------------------------------------------
  # Frontend — Vue.js / Vite
  # Accessible sur http://localhost:5173
  # --------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3000
    networks:
      - ecommerce

  # --------------------------------------------------------
  # Node Exporter — Métriques système (CPU, RAM, Disque)
  # --------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - ecommerce

networks:
  ecommerce:
    driver: bridge
    name: ecommerce

volumes:
  mongo_data: